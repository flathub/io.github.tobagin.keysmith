app-id: io.github.tobagin.keysmith
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: keymaker
separate-locales: false
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=~/.ssh
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gnome.keyring
cleanup:
  - /include
  - /lib/cmake
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/cmake
  - /share/doc
  - /share/gir-1.0
  - /share/man
  - /share/vala
  - '*.la'
  - '*.a'

modules:
  - name: openssh-client
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --sysconfdir=/app/etc
      - --without-ssh1
      - --with-privsep-path=/app/var/lib/sshd
      - --with-privsep-user=nobody
      - --with-sandbox=no
      - --disable-strip
    build-commands:
      - make
      - make install-nokeys
      - install -m 755 contrib/ssh-copy-id /app/bin/ssh-copy-id
    sources:
      - type: archive
        url: https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-9.9p2.tar.gz
        sha256: 91aadb603e08cc285eddf965e1199d02585fa94d994d6cae5b41e1721e215673
    cleanup:
      - /bin/sshd*
      - /libexec/sftp-server
      - /libexec/ssh-keysign
      - /libexec/ssh-pkcs11-helper
      - /sbin

  - name: qrencode
    buildsystem: cmake
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DBUILD_SHARED_LIBS=ON
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: git
        url: https://github.com/fukuchi/libqrencode.git
        tag: v4.1.1
        commit: 715e29fd4cd71b6e452ae0f4e36d917b43122ce8

  - name: zbar
    buildsystem: simple
    build-commands:
      - autoreconf -fiv
      - ./configure --prefix=/app --without-x --without-qt --without-gtk --without-python --disable-doc --without-dbus
      - make
      - make install
    sources:
      - type: git
        url: https://github.com/mchehab/zbar.git
        tag: 0.23.93
        commit: bb05ec54eec57f8397cb13fb9161372a281a1219

  - name: simdutf
    buildsystem: cmake
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: git
        url: https://github.com/simdutf/simdutf.git
        tag: v8.0.0
        commit: 7f3757fba1b426e7f583011ba7bc4e700a8fbb1a

  - name: fast_float
    buildsystem: cmake
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: git
        url: https://github.com/fastfloat/fast_float.git
        tag: v8.2.3
        commit: 01ce95dfe46abccf3264fbccf9f5139ea9016cd2

  - name: vte
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dvapi=true
      - -Dgtk4=true
      - -Dgtk3=false
      - -D_systemd=false
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/vte.git
        tag: 0.83.90
        commit: 85e37ce6152616807b2307ab050899710cce8398
    cleanup:
      - /etc

  - name: keymaker
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/tobagin/keymaker.git
        tag: v1.3.0
        commit: 405e7d7365e8734414ebdf49e55e905568698d72